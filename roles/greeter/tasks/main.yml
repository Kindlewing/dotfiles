---
- name: Install greetd + tuigreet
  become: true
  community.general.pacman:
    name:
      - greetd
      - greetd-tuigreet
    state: present

- name: Create greeter user
  become: true
  ansible.builtin.user:
    name: greeter
    system: true
    create_home: false
    shell: /sbin/nologin
    groups: video
    append: true

- name: Deploy greetd config
  become: true
  ansible.builtin.copy:
    src: greetd/config.toml
    dest: /etc/greetd/config.toml
    mode: "0644"

- name: Enable and start greetd service
  become: true
  ansible.builtin.systemd_service:
    name: greetd.service
    enabled: true
    state: started
