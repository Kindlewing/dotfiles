---
- name: Install niri
  become: true
  community.general.pacman:
    name: niri
    state: present

- name: Ensure niri config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/niri"
    state: directory
    mode: '0755'

- name: Symlink niri config.kdl
  ansible.builtin.file:
    src: "{{ role_path }}/files/niri/config.kdl"
    dest: "{{ ansible_facts['user_dir'] }}/.config/niri/config.kdl"
    state: link
    follow: false
