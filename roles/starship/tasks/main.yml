---
- name: Install starship
  become: true
  community.general.pacman:
    name: starship
    state: present

- name: Symlink starship config
  ansible.builtin.file:
    src: "{{ role_path }}/files/starship.toml"
    dest: "{{ ansible_facts['user_dir'] }}/.config/starship.toml"
    state: link
    force: true
